version: '3.9'

services:
  # ════════════════════════════════════════════════════════
  # DocFlow Pro — Conversor PDF
  docflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docflow-pro
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      CORS_ORIGIN: "http://localhost:3000,http://localhost:8080"
      RATE_LIMIT: 100
      CLEANUP_INTERVAL: 3600000
      SESSION_TIMEOUT: 86400000
      REDIS_URL: "redis://redis:6379"
      FEATURE_SMART_REPAIR: "true"
      FEATURE_COMPRESSION: "true"
      FEATURE_OCR: "false"
    volumes:
      - docflow-data:/app/data
      - docflow-logs:/app/logs
      - docflow-outputs:/app/outputs
      - docflow-uploads:/app/uploads
      - docflow-temp:/app/temp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - docflow-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.docflow.description=DocFlow Pro — Conversor PDF Robusto"
      - "com.docflow.version=2.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════
  # Redis — Fila de Processamento (Opcional)
  redis:
    image: redis:7-alpine
    container_name: docflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - docflow-net
    command: redis-server --appendonly yes --requirepass docflow_redis_2024
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════════════
  # Nginx — Reverse Proxy & Load Balancer (Opcional)
  nginx:
    image: nginx:alpine
    container_name: docflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - docflow-outputs:/var/www/outputs:ro
    depends_on:
      - docflow
    restart: unless-stopped
    networks:
      - docflow-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════
  # Prometheus — Monitoramento (Opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: docflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - docflow-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"

  # ════════════════════════════════════════════════════════
  # Grafana — Dashboard (Opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: docflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - docflow-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"

volumes:
  docflow-data:
    driver: local
  docflow-logs:
    driver: local
  docflow-outputs:
    driver: local
  docflow-uploads:
    driver: local
  docflow-temp:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  docflow-net:
    driver: bridge

# ════════════════════════════════════════════════════════
# COMO USAR:
# ════════════════════════════════════════════════════════
#
# Iniciar tudo:
#   docker-compose up -d
#
# Ver logs:
#   docker-compose logs -f docflow
#
# Parar tudo:
#   docker-compose down
#
# Limpar volumes:
#   docker-compose down -v
#
# Rebuild:
#   docker-compose build --no-cache && docker-compose up -d
#
# Aceder aos serviços:
#   DocFlow:    http://localhost:3000
#   Redis:      localhost:6379
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3001 (admin/admin)
#
