<!-- MODAL ASSINATURA DIGITAL -->
<div id="modal-assinatura" class="modal-overlay" style="display:none;">
  <div class="modal-content modal-grande">
    <button class="modal-close" onclick="fecharModalAssinatura()">✕</button>
    
    <h2>🖊️ DocFlow Sign - Assinatura Digital</h2>
    
    <div class="assinatura-container">
      <!-- ESQUERDA: Preview PDF -->
      <div class="assinatura-preview">
        <h3>📄 PDF Preview</h3>
        <div id="pdf-preview" class="pdf-preview-box">
          <p style="color: #999;">Carregue um PDF para assinar</p>
        </div>
      </div>
      
      <!-- DIREITA: Assinatura -->
      <div class="assinatura-editor">
        <h3>✏️ Sua Assinatura</h3>
        
        <!-- Abas -->
        <div class="abas-assinatura">
          <button class="aba-btn aba-ativo" onclick="mudarTipoAssinatura('desenho')">Desenhar</button>
          <button class="aba-btn" onclick="mudarTipoAssinatura('texto')">Texto + Nome</button>
          <button class="aba-btn" onclick="mudarTipoAssinatura('carimbo')">🔐 Carimbo</button>
        </div>
        
        <!-- Desenho -->
        <div id="tab-desenho" class="tab-assinatura ativo">
          <canvas id="canvas-assinatura" width="300" height="150" style="border: 2px dashed #ddd; cursor: crosshair; border-radius: 4px; background: white;"></canvas>
          <div class="controles-assinatura">
            <label>Tamanho do Pincel: <input type="range" id="tamanho-pincel" min="1" max="10" value="3"></label>
            <label>Cor: <input type="color" id="cor-pincel" value="#000000"></label>
            <button onclick="limparCanva()" class="btn-secundario">↶ Limpar</button>
          </div>
        </div>
        
        <!-- Texto -->
        <div id="tab-texto" class="tab-assinatura" style="display:none;">
          <input type="text" id="input-assinatura-texto" placeholder="Digite sua assinatura" maxlength="30" style="width:100%; padding:8px; margin-bottom:10px;">
          <input type="text" id="input-nome" placeholder="Seu nome completo" maxlength="50" style="width:100%; padding:8px; margin-bottom:10px;">
          <p style="color: #666; font-size: 12px;">A data/hora será adicionada automaticamente</p>
        </div>
        
        <!-- Carimbo -->
        <div id="tab-carimbo" class="tab-assinatura" style="display:none;">
          <input type="text" id="input-nome-carimbo" placeholder="Seu nome" maxlength="50" style="width:100%; padding:8px; margin-bottom:10px;">
          <select id="select-cargo" style="width:100%; padding:8px; margin-bottom:10px;">
            <option>Selecione cargo/função</option>
            <option>Gerente</option>
            <option>Diretor</option>
            <option>Administrador</option>
            <option>Assinante</option>
            <option>Outro</option>
          </select>
          <p style="color: #666; font-size: 12px;">Será criado um carimbo oficial com verificação</p>
        </div>
        
        <!-- Controles Posição -->
        <div class="controles-posicao">
          <h4>Posição no PDF</h4>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <label>X: <input type="number" id="pos-x" value="100" min="0" max="500"></label>
            <label>Y: <input type="number" id="pos-y" value="100" min="0" max="700"></label>
          </div>
          <p style="color: #999; font-size: 12px;">Ou clique no preview para posicionar</p>
        </div>
        
        <!-- Botões -->
        <div class="botoes-assinatura">
          <button onclick="cancelarAssinatura()" class="btn-secundario">Cancelar</button>
          <button onclick="assinarPDF()" class="btn-primario">✓ Assinar PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.assinatura-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}

.assinatura-preview, .assinatura-editor {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.pdf-preview-box {
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 20px;
  height: 400px;
  overflow-y: auto;
  background: #f9f9f9;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: crosshair;
}

.abas-assinatura {
  display: flex;
  gap: 5px;
  border-bottom: 2px solid #eee;
  margin-bottom: 15px;
}

.aba-btn {
  padding: 8px 15px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
}

.aba-btn.aba-ativo {
  border-bottom-color: #0066cc;
  color: #0066cc;
  font-weight: bold;
}

.tab-assinatura {
  display: none;
}

.tab-assinatura.ativo {
  display: block;
}

.controles-assinatura, .controles-posicao {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 4px;
  margin-top: 10px;
}

.botoes-assinatura {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

@media (max-width: 1024px) {
  .assinatura-container {
    grid-template-columns: 1fr;
  }
}
</style>
