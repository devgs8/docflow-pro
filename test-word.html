<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Word to PDF Test</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        input { padding: 10px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; cursor: pointer; }
        #log { margin-top: 20px; background: #f0f0f0; padding: 10px; font-family: monospace; white-space: pre; }
    </style>
</head>
<body>
    <h1>Word to PDF Converter</h1>
    <input type="file" id="file" accept=".docx">
    <button onclick="converter()">Converter</button>
    <div id="log"></div>
    
    <script>
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
        }
        
        async function converter() {
            const file = document.getElementById('file').files[0];
            if (!file) { log('Selecione um ficheiro'); return; }
            
            log('[1] Enviando: ' + file.name);
            
            const form = new FormData();
            form.append('file', file);
            
            try {
                const res = await fetch('/api/convert/word-pdf', {method: 'POST', body: form});
                const data = await res.json();
                
                if (data.ok) {
                    log('[2] OK! Download: ' + data.downloadUrl);
                    const a = document.createElement('a');
                    a.href = data.downloadUrl;
                    a.download = data.downloadUrl.split('/').pop();
                    a.click();
                } else {
                    log('[ERROR] ' + data.error);
                }
            } catch (err) {
                log('[ERROR] ' + err.message);
            }
        }
    </script>
</body>
</html>
